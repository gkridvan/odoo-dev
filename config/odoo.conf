[options]
; =============================================================================
; Odoo Server Configuration
; =============================================================================
; This file is mounted into the container at /etc/odoo/odoo.conf
;
; KEY SETTINGS explained:
;   addons_path  — where Odoo looks for modules (built-in + your custom ones)
;   db_host      — "db" matches the service name in docker-compose.yml
;   admin_passwd — master password for database management page
; =============================================================================

addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons

; --- Database connection (must match docker-compose.yml) ---
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo

; --- Security ---
admin_passwd = MySuperSecretAdminPassword

; --- Logging (very useful for debugging) ---
log_level = info
; For more verbose module-level debugging, uncomment:
; log_handler = odoo.addons.website_360_view:DEBUG

; --- Performance ---
workers = 0
; workers = 0 means single-process mode (good for development)
; In production on Odoo.sh, workers are auto-configured

; --- Developer mode on startup (optional) ---
; dev_mode = reload,qweb,xml
